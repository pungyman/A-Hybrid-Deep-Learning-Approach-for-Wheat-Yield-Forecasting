data:
  base_path: '../../data/datasets/7_states/1'
  train_file: train.csv
  val_file: val.csv

training:
  n_epochs: 100
  early_stopping_patience: 15
  validation_loss: l1

dataloader:
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  drop_last_train: true

optimization:
  study_name: 7_states_study_1
  hpo_dir: '../../experiments/hpo/7_states/1'
  n_trials: 9000
  timeout_hours: 8
  pruning: true

  hparam_search_space:
    use_soil_features:
      type: 'categorical'
      choices: [false]

    rnn_type:
      type: 'categorical'
      choices: ['gru', 'lstm']

    bidirectional:
      type: 'categorical'
      choices: [true, false]

    rnn_n_layers:
      type: 'int'
      low: 1
      high: 4

    rnn_hidden_dim:
      type: 'int'
      low: 16
      high: 256
      step: 8

    use_temporal_attention:
      type: 'categorical'
      choices: [true, false]

    attention_type:
      type: 'categorical'
      choices: ['bahdanau', 'self']

    attention_dim:
      type: 'int'
      low: 16
      high: 128
      step: 16

    attention_use_bias:
      type: 'categorical'
      choices: [true, false]

    use_layer_norm:
      type: 'categorical'
      choices: [true, false]

    soil_out_channels:
      type: 'int'
      low: 8
      high: 64
      step: 8
      
    soil_kernel_size:
      type: 'categorical'
      choices: [2, 3, 4, 5]

    soil_n_conv_blocks:
      type: 'int'
      low: 1
      high: 2

    n_fc_layers:  # not including the output layer
      type: 'int'
      low: 1
      high: 5

    fc_layer_size:
      type: 'int'
      low: 16
      high: 256
      step: 16 

    rnn_dropout_prob:
      type: 'float'
      low: 0.05
      high: 0.5

    fc_dropout_prob:
      type: 'float'
      low: 0.1
      high: 0.6

    learning_rate:
      type: 'loguniform'
      low: 1e-5
      high: 1e-2
      
    weight_decay:
      type: 'loguniform'
      low: 1e-6
      high: 1e-2

    huber_delta:
      type: 'float'
      low: 1.0
      high: 1500.0

    batch_size:
      type: 'categorical'
      choices: [16, 32, 64, 128]
