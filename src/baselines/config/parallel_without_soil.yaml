data:
  base_path: "../../data/datasets/final"
  train_file: train.csv
  val_file: val.csv
  test_file: test.csv

reproducibility:
  seed: 42
  deterministic: true
  num_runs: 5

dataloader:
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  drop_last_train: true

model:
  model_type: parallel
  use_soil_features: false
  conv1_channels: 32
  conv2_channels: 64
  lstm_hidden: 64
  lstm_layers: 2
  lstm_dropout: 0.3
  attention_dim: 64
  fc_hidden_dims: [128, 64, 32]
  fc_dropout_prob: 0.3

training:
  n_epochs: 100
  early_stopping_patience: 15
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: l2

output:
  model_save_dir: "../rnn/saved_models/parallel_without_soil"
