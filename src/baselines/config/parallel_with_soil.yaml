data:
  base_path: "../../data/datasets/final"
  train_file: train.csv
  val_file: val.csv
  test_file: test.csv

reproducibility:
  seed: 42
  deterministic: true
  num_runs: 5

dataloader:
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  drop_last_train: true

model:
  model_type: parallel
  use_soil_features: true
  conv1_channels: 48
  conv2_channels: 48
  lstm_hidden: 48
  lstm_layers: 3
  lstm_dropout: 0.006
  attention_dim: 32
  fc_hidden_dims: [176, 192, 224]
  fc_dropout_prob: 0.3

training:
  n_epochs: 100
  early_stopping_patience: 15
  learning_rate: 0.003
  weight_decay: 0.00001
  loss: l2

output:
  model_save_dir: "../rnn/saved_models/parallel_with_soil"
