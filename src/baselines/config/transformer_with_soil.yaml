data:
  base_path: "../../data/datasets/final"
  train_file: train.csv
  val_file: val.csv
  test_file: test.csv

reproducibility:
  seed: 42
  deterministic: true
  num_runs: 5

dataloader:
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  drop_last_train: true

model:
  model_type: transformer
  use_soil_features: true
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 96
  dropout: 0.38
  fc_hidden_dims: [80, 80, 80]
  fc_dropout_prob: 0.4

training:
  n_epochs: 100
  early_stopping_patience: 15
  learning_rate: 0.0037
  weight_decay: 0.00015
  loss: l2

output:
  model_save_dir: "../rnn/saved_models/transformer_with_soil"
